<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Task Manager | Erez Haimov</title>
		<link rel="stylesheet" href="style.css" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
			rel="stylesheet" />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
	</head>
	<body>
		<div class="toolbar">
			<button id="themeToggle" class="tool-btn">🌙</button>
			<button id="langToggle" class="tool-btn">
				<img
					id="flag-icon"
					src="https://flagcdn.com/w40/il.png"
					alt="Toggle Language" />
			</button>
		</div>

		<header>
			<h1 id="ui-title">Task Manager</h1>
		</header>

		<main>
			<section class="input-section">
				<input type="text" id="taskInput" placeholder="Task Details" />
				<input type="date" id="taskDate" />
				<button id="addTaskBtn" class="primary-btn">Add Task</button>
			</section>

			<section class="controls">
				<div class="filters">
					<button
						class="filter-btn active"
						data-filter="all"
						id="filter-all">
						All
					</button>
					<button
						class="filter-btn"
						data-filter="completed"
						id="filter-completed">
						Completed
					</button>
					<button
						class="filter-btn"
						data-filter="active"
						id="filter-active">
						Active
					</button>
				</div>
				<div class="sorters">
					<button id="sortDateBtn" class="sort-btn">
						Sort by Due Date
					</button>
				</div>
			</section>

			<ul id="taskList"></ul>
		</main>

		<a href="#" id="toTopBtn" title="Go to top">
			<i class="bi bi-arrow-up"></i>
		</a>

		<footer>
			<div id="contact">
				<h5 id="ui-contact-title">Contact/Follow Me</h5>
				<div class="footer-socials">
					<a href="mailto:haimov.erez@gmail.com">
						<i class="bi bi-envelope-fill"></i>
					</a>
					<a href="https://github.com/ErezHaimov" target="_blank">
						<i class="bi bi-github"></i>
					</a>
					<a
						href="https://www.linkedin.com/in/erez-haimov/"
						target="_blank">
						<i class="bi bi-linkedin"></i>
					</a>
				</div>
			</div>
			<div class="footer-bottom">
				<h6 id="ui-copyright">
					&copy; 2026 Erez Haimov | All Rights Reserved
				</h6>
			</div>
		</footer>

		<script src="script.js"></script>
	</body>
</html>
