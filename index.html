<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Task Manager | Erez Haimov</title>
		<!-- Bootstrap CSS - Base styling and utility classes -->
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
		<!-- Custom Styles -->
		<link rel="stylesheet" href="style.css" />
		<!-- Google Fonts - Inter -->
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" />
		<!-- Bootstrap Icons -->
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
	</head>
	<body>
		<!-- Floating alert container for error/success messages -->
		<div id="error-container"></div>

		<!-- Toolbar: Theme toggle and language toggle -->
		<div class="toolbar">
			<button id="themeToggle" class="tool-btn">🌙</button>
			<button id="langToggle" class="tool-btn">
				<img
					id="flag-icon"
					src="https://flagcdn.com/w40/il.png"
					alt="Toggle Language" />
			</button>
		</div>

		<header>
			<h1 id="ui-title">Task Manager</h1>
		</header>

		<main>
			<!-- Input section: Task text, due date, and add button -->
			<section class="input-section">
				<div class="date-wrapper">
					<label for="taskInput" id="ui-task-label">
						Task Details
					</label>
					<input type="text" id="taskInput" />
				</div>
				<div class="date-wrapper">
					<label for="taskDate" id="ui-date-label">Due Date</label>
					<input type="date" id="taskDate" />
				</div>
				<button id="addTaskBtn" class="primary-btn">Add Task</button>
			</section>

			<!-- Controls: Filter buttons and sort button -->
			<section class="controls">
				<div class="filters">
					<button
						class="filter-btn active"
						data-filter="all"
						id="filter-all">
						All
					</button>
					<button
						class="filter-btn"
						data-filter="completed"
						id="filter-completed">
						Completed
					</button>
					<button
						class="filter-btn"
						data-filter="active"
						id="filter-active">
						Active
					</button>
				</div>
				<div class="sorters">
					<button id="sortDateBtn" class="sort-btn">
						Sort by Due Date
						<span class="sort-arrow">↑</span>
					</button>
				</div>
			</section>

			<!-- Task list - populated dynamically by JavaScript -->
			<ul id="taskList"></ul>
		</main>

		<!-- Floating "back to top" button -->
		<a href="#" id="toTopBtn" title="Go to top">
			<i class="bi bi-arrow-up"></i>
		</a>

		<footer>
			<!-- Contact and social links -->
			<div id="contact">
				<h5 id="ui-contact-title">Contact/Follow Me</h5>
				<div class="footer-socials">
					<a href="mailto:haimov.erez@gmail.com">
						<i class="bi bi-envelope-fill"></i>
					</a>
					<a href="https://github.com/ErezHaimov" target="_blank">
						<i class="bi bi-github"></i>
					</a>
					<a
						href="https://www.linkedin.com/in/erez-haimov/"
						target="_blank">
						<i class="bi bi-linkedin"></i>
					</a>
				</div>
			</div>
			<div class="footer-bottom">
				<h6 id="ui-copyright">
					&copy; 2026 Erez Haimov | All Rights Reserved
				</h6>
			</div>
		</footer>

		<!-- Bootstrap JS Bundle -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
		<!-- Main Application Script -->
		<script src="script.js"></script>
	</body>
</html>
